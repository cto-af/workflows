on:
  workflow_call:
    inputs:
      nve:
        description: 'Cache nve node versions if true'
        required: false
        type: boolean
        default: false
      platforms:
        description: 'What platforms to run on, as a JSON string'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      playwright:
        description: 'Install playwright if true'
        required: false
        type: boolean
        default: false
      script:
        description: 'Which npm script to run'
        required: false
        type: string
        default: build
      versions:
        description: 'Which versions of node to run, as JSON string'
        required: false
        type: string
        default: '[20, 22, 24, 25]'
    secrets:
      CODECOV_TOKEN:
        description: If supplied, send coverage metrics to codecov.io
        required: false
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(inputs.versions) }}
        platform: ${{ fromJson(inputs.platforms) }}
    runs-on: ${{ matrix.platform }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true
      - name: Find nve cache directory
        if: inputs.nve
        run: |
          echo "NVE_CACHE=$(node -e 'cachedir = require("./node_modules/.pnpm/node_modules/cachedir"); console.log(cachedir("nve"))')" >> $GITHUB_ENV
      - name: Cache node versions for nve in ${{ env.NVE_CACHE }}
        if: inputs.nve
        id: cache-nve
        uses: actions/cache@v4
        with:
          path: ${{ env.NVE_CACHE }}
          key: ${{ runner.os }}-nve
      - name: Get installed Playwright version
        if: inputs.playwright
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm ls @playwright/test --parseable | tail -1)" >> $GITHUB_ENV
      - name: Playwright Cache ${{ env.PLAYWRIGHT_VERSION }}
        if: inputs.playwright
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Playwright install
        if: inputs.playwright
        run: npx playwright install --with-deps
      - name: Running ${{ inputs.script }} on node ${{ matrix.node-version }}, ${{ matrix.platform }}
        run: npm run ${{ inputs.script }}
      - name: Audit
        run: pnpm audit
      - name: Upload coverage reports to Codecov
        if: env.CODECOV_TOKEN
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

